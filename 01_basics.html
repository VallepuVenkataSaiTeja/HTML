<!-- 

HTML (HyperText Markup Language) :
---------------------------------
- standard language used to create web pages.
- defines structure of webpage.
- markup language ( not programming language )


History :
--------
- created by Tim Berners-Lee (1991)


Versions :
---------
- HTML 1.0  (1993) -> basic web pages
- HTML 2.0  (1995) -> standardized HTML
- HTML 3.2  (1997) -> tables, applets
- HTML 4.01 (1999) -> css , forms
- XHTML     (2000) -> stricter HTML rules
- HTML5     (2015) -> audio, video, canvas, semantic tags


HTML Document Structure :
------------------------

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
</head>

<body>
    <h1>Hello World</h1>
    <p>Welcome to HTML</p>

</body>

</html>


- <!DOCTYPE html> : tells browser that the document uses HTML5.
- <html>          : root element of webpage.
- <head>          : contains metadata (title, css links, meta title, icons)
- <body>          : contains everything visible on webpage


HTML comments :
--------------
- used to write notes that browser ignores.
- type ! and press Tab.


Emmet :
------
- shortcut system that generates HTML quickly.
- Ex: h1, p, li*5, ul>li, h1+p, div.container, div#header, nav>ul>li*4, p{Hello World}, ul>li.item$*5


File Extension : (.html)
---------------
- Ex: index.html


HTML elements :
--------------
- consists of <tag>Content</tag>
- Ex: <p>hello</p>
  <p>   - opening tag
  hello - content
  </p>  - closing tag


HTML tags :
----------
- tells browser what type of content to display.
- Ex: <h1></h1>, <p></p>, <img>, <a></a>, <div></div>


attributes :
-----------
- provide extra information about an element.
- Ex: <a href="https://example.com/">Visit</a> (tag: a , attribute: href)
      <img src="image.jpg" alt="flower" />


empty (void) elements :
----------------------
- dont have closing tags.
- Ex: <br> ,<hr> ,<img> ,<input> ,<meta> ,<link>


nesting :
--------
- placing html element inside another element.
- Ex:    
        <div>
            <h1>Welcome</h1>
            <p>Hello</p>
        </div>


case sensitivity :
-----------------
- not case-sensitive, but convention is to write them in lowercase.
- Ex: <h1>hello</h1> ( recommended ) , 
      <H1>hello</H1> ( avoid )


Indentation :
------------
- proper indentation improves readability.


Browser Inspection :
-------------------
- using devtools (inspect) , view page source

-->
