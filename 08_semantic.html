<!-- 

Semantic HTML :
--------------
- Semantic HTML uses elements that describe the meaning and purpose of the content, making web pages easier for developers, browsers, search engines, and assistive technologies to understand.
- Instead of using generic elements like <div> and <span> everywhere, semantic HTML provides meaningful tags such as <header>, <nav>, <main>, and <footer>.

- Non-Semantic HTML - <div> ( The browser doesn't know what each <div> represents. )

    <div id="header">
        <h1>My Website</h1>
    </div>

    <div id="menu">
        Home | About | Contact
    </div>

    <div id="content">
        Welcome to my website.
    </div>

    <div id="footer">
        Copyright 2026
    </div>


- Semantic means meaningful. Now the structure is clear and meaningful.

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        Home | About | Contact
    </nav>

    <main>
        Welcome to my website.
    </main>

    <footer>
        Copyright 2026
    </footer>


Advantages :

- Better code readability.
- Improves accessibility.
- Helps search engines understand your page (SEO).
- Easier to maintain.
- Creates a logical document structure.


Page Structure :
---------------
- A typical semantic HTML page looks like this:

    +----------------------------------+
    | Header                           |
    +----------------------------------+
    | Navigation                       |
    +----------------------------------+
    | Main                             |
    |  +----------------------------+  |
    |  | Section                    |  |
    |  |   Article                  |  |
    |  +----------------------------+  |
    |  | Aside                      |  |
    |  +----------------------------+  |
    +----------------------------------+
    | Footer                           |
    +----------------------------------+


<header> :
---------
- Represents introductory content.
- Usually contains: ( Logo, Website title, Search bar, Navigation (sometimes) )
- A page or an individual <article> can have its own <header>.

    <header>
        <h1>Tech World</h1>
        <p>Learn Web Development</p>
    </header>


<nav> :
------
- Represents navigation links.
- Usually contains: ( Main menu, Sidebar navigation, Table of contents )

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>


<main> :
-------
- Represents the main content of the page.
- Only one <main> per page.
- Should not contain repeated content like headers or footers.

    <main>
        <h2>Latest Articles</h2>
        <p>Welcome to our blog.</p>
    </main>


<section> :
----------
- Represents a thematic group of related content.
- Use <section> when the content has a heading and forms a logical part of the page.

    <section>
        <h2>Our Courses</h2>
            <p>HTML</p>
            <p>CSS</p>
            <p>JavaScript</p>
    </section>


<article> :
----------
- Represents independent, self-contained content.
- Examples: Blog post , News article , Forum post , Product review , User comment
- An <article> should make sense even if viewed by itself.

    <article>
        <h2>HTML Basics</h2>
        <p>HTML is the standard markup language...</p>
    </article>


<aside> :
--------
- Represents content related to, but separate from, the main content.
- Examples: Sidebar , Advertisements , Related posts , Author information , Quick links

    <aside>
        <h3>Related Articles</h3>
        <ul>
            <li>CSS Basics</li>
            <li>JavaScript Basics</li>
        </ul>
    </aside>


<footer> :
---------
- Represents the footer.
- Usually contains: Copyright , Contact details , Social media links , Privacy Policy , Terms of Service
- A page or an <article> can have its own footer.

    <footer>
        <p>© 2026 My Website</p>
    </footer>


<figure> :
---------
- Represents self-contained media.

<figure>
    <img src="mountain.jpg" alt="Mountain">
    <figcaption>Beautiful Mountain</figcaption>
</figure>


<figcaption> :
-------------
- Provides a caption for a figure.

    <figure>
        <img src="flower.jpg" alt="Flower">
        <figcaption>Red Rose</figcaption>
    </figure>


<details> :
----------
- Creates expandable content.
- Output:

    ▶ Read More
    When clicked:

    ▼ Read More
    This is hidden content.


<time> :
-------
- Represents dates and times.
- datetime provides a machine-readable value.

<p>
    Published on
    <time datetime="2026-07-03">
    July 3, 2026
    </time>
</p>


<mark> :
-------
- Highlights text.

    <p>
        HTML is
        <mark>easy</mark>
        to learn.
    </p>


<address> :
----------
- Represents contact information.

    <address>
        ABC Company
        <br>
        Bengaluru
        <br>
        India
    </address>


Semantic Page Layout :
---------------------

    <body>
    │
    ├── <header>
    │
    ├── <nav>
    │
    ├── <main>
    │     │
    │     ├── <section>
    │     │      │
    │     │      └── <article>
    │     │
    │     └── <aside>
    │
    └── <footer>



-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <head>
        <h1>This is a header</h1>
    </head>

    <nav>
        <a href="">Home</a>
        <a href="">About</a>
    </nav>

    <main>
        <p>this is a main page tag</p>
    </main>

    <section>
        <p>courses</p>
    </section>

    <article>
        <p>blog post</p>
    </article>

    <aside>
        <p>sidebar</p>
    </aside>

    <footer>
        <p>my website</p>
    </footer>

    <figure>
        <img src="flower.img" alt="">
        <figcaption>caption of image</figcaption>
    </figure>

    <details>
        <summary>read more</summary>
        <p>hidden content</p>
    </details>
    
    <time datetime="04-07-2026">
        today
    </time>

    <mark>easy</mark>

    <address>
        1/23 <br>
        bengaluru
    </address>
</body>
</html>
