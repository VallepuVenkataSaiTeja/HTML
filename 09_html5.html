HTML5 :
------
- HTML5 is the latest major version of HTML. It introduced new semantic elements, multimedia support, graphics, improved forms, APIs, and better browser capabilities without requiring external plugins like Flash.

- Simple DOCTYPE ( <!DOCTYPE html> )

- Character Encoding ( <meta charset="UTF-8"> )
- Supports almost every language and special character.

- Responsive Viewport ( <meta name="viewport" content="width=device-width, initial-scale=1.0"> )
- Makes web pages responsive on mobile devices. Without this tag, pages may not display correctly on phones and tablets.

- Semantic Elements

- Native Audio

    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>

- Native Video

    <video controls width="500">
        <source src="movie.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

- Canvas : The <canvas> element allows JavaScript to draw graphics.

    <canvas id="myCanvas" width="300" height="150">

    </canvas>

- SVG (Scalable Vector Graphics) : SVG creates graphics using XML.

    <svg width="200" height="200">
        <circle cx="100" cy="100" r="50" fill="red" />
    </svg>

- Improved Forms : HTML5 introduced many new input types.

- New Input Types

- New Form Attributes ( Placeholder, Required, Autofocus, Pattern, Min and Max, Step )

- Datalist : Provides suggestions while allowing custom input.

- Progress Bar : Shows task progress.

    <progress value="60" max="100"> </progress>

- Meter : Represents a measurement within a range.

    <meter value="0.8"> 80% </meter>

- Details and Summary : Expandable content.

    <details>
        <summary>Read More</summary>
        <p>Hidden content.</p>
    </details>

- Mark : Highlights text.

    <p>
        HTML5 is <mark>easy</mark> to learn.
    </p>

- Time : Represents dates and times.

    <time datetime="2026-07-04"> July 4, 2026 </time>

- Drag and Drop API : Allows elements to be dragged using JavaScript.

    <div draggable="true"> Drag Me </div>

- Geolocation API : Gets the user's location using JavaScript.

    navigator.geolocation.getCurrentPosition(showPosition);

- Web Storage : Stores data inside the browser. ( Local Storage , Session Storage )

- Offline Web Applications

- Web Workers : Run JavaScript in the background.

- History API : Manipulates browser history without reloading the page.

- WebSocket : Provides two-way communication between the browser and server.

- HTML5 APIs

-->
