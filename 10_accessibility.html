Accessibility :
--------------

- Accessibility means designing websites so that everyone, including people with disabilities, can use them effectively.
- The term a11y comes from: a + 11 letters + y = accessibility

Benefits :
- Makes websites usable for everyone.
- Improves SEO (Search Engine Optimization).
- Enhances user experience.
- Helps meet legal and organizational accessibility standards.
- Makes websites easier to maintain.

- Use Semantic HTML : Semantic elements help browsers and assistive technologies understand the page structure.

- Add alt Text to Images : Every meaningful image should have an alt attribute.

- Use Labels with Form Controls

- Keyboard Accessibility : Many users navigate using only the keyboard.

- Use Proper Heading Order : Avoid skipping heading levels.

- Use Descriptive Link Text : Users should understand the destination without additional context.

- Provide Captions for Videos : Videos should include captions.

- Audio Transcripts : Audio-only content should provide text transcripts.

- Use Buttons for Actions

- Use Tables Properly : Always use table headers.

- Use Language Attribute : Always specify the page language.

- Color Contrast : Ensure text is easy to read.

- Don't Rely Only on Color

- Focus Indicators : Keyboard users need to know which element is currently selected.

- ARIA (Accessible Rich Internet Applications) : ARIA improves accessibility for dynamic interfaces.

- Screen Readers : Screen readers convert webpage content into speech or Braille.

- Skip Navigation Link : Allows keyboard users to jump directly to the main content.

- Responsive Design : Accessibility also includes usability on different devices.
