HTML SEO Basics :
----------------

- SEO (Search Engine Optimization) is the process of improving a website so that search engines like Google can better understand, index, and rank it in search results.

Good SEO helps your website:
- Appear higher in search results
- Increase organic (free) traffic
- Improve user experience
- Make content easier to discover

- On-Page SEO – Optimizing content and HTML.
- Off-Page SEO – Building backlinks and online reputation.
- Technical SEO – Improving site performance, indexing, and crawlability.

- As an HTML developer, you'll mainly focus on On-Page SEO and some Technical SEO basics.


- Use a Meaningful <title> : The <title> tag is one of the most important SEO elements.
- Meta Description : The meta description summarizes the page.
- Meta Keywords (Historical) : Modern search engines such as Google ignore the keywords meta tag. It is generally unnecessary today.
- Viewport Meta Tag : Important for mobile SEO. Responsive websites perform better on mobile devices.
- Character Encoding : Ensures text is displayed correctly across different languages.
- Use Semantic HTML : Search engines understand semantic elements better.
- Proper Heading Structure : Use headings correctly.
- Use Descriptive URLs
- Image SEO : Always provide alt text.
- Use Descriptive Link Text : Search engines use anchor text to understand linked pages.
- Internal Links : Connect pages within your website.
- External Links : Link to useful, trustworthy resources when appropriate.
- Canonical URL : Prevents duplicate-content issues. ( If the same content is accessible through multiple URLs, the canonical link tells search engines which version is preferred. )
- Robots Meta Tag : Controls indexing.
- Open Graph Meta Tags : Used when sharing pages on social media.
- Favicon : Helps branding.
- Structured Data (Schema Markup) : Structured data helps search engines understand your content.
- Mobile-Friendly Pages : Use responsive design.
- Fast Loading Pages : Page speed is important for SEO.
- Clean HTML Code : Avoid unnecessary nested elements.
- Sitemap : A sitemap lists all important pages of a website. 
- Robots.txt : Controls which pages search engines can crawl.
