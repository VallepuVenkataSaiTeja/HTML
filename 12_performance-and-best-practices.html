HTML Performance and Best Practices :
------------------------------------
- Performance means making your web pages load faster, use fewer resources, and provide a smooth user experience.
- Best practices are recommended coding techniques that make HTML more readable, maintainable, accessible, and SEO-friendly.


- Write Clean HTML : Keep your HTML simple and organized. Avoid unnecessary nesting.
- Use Semantic HTML
- Optimize Images : Images are usually the largest files on a webpage.
- Lazy Loading : Load images only when needed.
- Specify Image Dimensions
- Minimize HTTP Requests : Every resource requires a request. ( Fewer requests generally improve loading speed. )
- Load CSS Efficiently : Place CSS in the <head>. The browser can style the page while it loads.
- Load JavaScript Efficiently ( defer, async )
- Reduce File Size : Minify production files. Minification removes unnecessary whitespace and comments.
- Avoid Inline Styles
- Use External CSS and JavaScript
- Use Proper Heading Structure
- Keep HTML Valid : Always close tags correctly.
- Use Meaningful Attribute Values
 

-->
